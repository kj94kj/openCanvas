name: Backend Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./openCanvas

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/opencanvas-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/opencanvas-backend:latest

      - name: Deploy to backend EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/opencanvas-backend:latest

            sudo docker rm -f opencanvas || true

            sudo docker run -d \
              --name opencanvas \
              --network opencanvas-net \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_DATA_REDIS_HOST=redis \
              -e SPRING_DATA_REDIS_PORT=6379 \
              ${{ secrets.DOCKERHUB_USERNAME }}/opencanvas-backend:latest